    <!-- ═══ PWA META TAGS YARAM ═══ -->

    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Splash screens iPhone -->
    <link rel="apple-touch-startup-image" href="/splash-iphone.png"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-iphone-se.png"

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker pour PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('✓ YARAM SW enregistré :', reg.scope))
            .catch((err) => console.warn('⚠ YARAM SW échec :', err));
        });
      }
    </script>
