<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">
  <!--
    YARAM App Icon v2 — Refonte centrage VISUEL parfait.
    
    Problèmes de la v1 :
      • Y à scale(6) = 46% du canvas → écrase le point orange, pas d'air
      • Centrage géométrique pur ≠ centrage visuel (un Y a un point
        d'équilibre optique légèrement au-dessus du centre géométrique
        à cause de sa forme V au top + stem au bottom)
      • Point orange à r=56 invisible à petite taille (Home Screen iPhone)
    
    Fix v2 :
      • scale(4.5) → Y fait 35% du canvas (style Apple icons modernes :
        Calculator, Music, Camera ont tous ~40% de contenu pour respirer)
      • translate(-60.42, -10.14) → centre géométrique à (512, 502)
        soit 10px au-dessus du milieu : compensation optique du Y
      • Point orange r=72 (vs 56) + position (820, 820) (vs 780)
        → plus présent, mieux dégagé du pied du Y
  -->
  <rect fill="#009640" x="0" y="0" width="1024" height="1024"/>
  
  <!-- Y blanc : centre optique à (512, 502), width 35% -->
  <g transform="translate(-60.42 -10.14) scale(4.5)">
    <path fill="#fff" d="M153.9,64.45l-20.93,30.57-21.02-30.57h-24.32l28.48,41.39v58.66h23.8v-60.88l26.87-39.16h-12.87Z"/>
  </g>
  
  <!-- Point orange signature — plus gros et plus présent -->
  <circle fill="#e94e1b" cx="820" cy="820" r="72"/>
</svg>
