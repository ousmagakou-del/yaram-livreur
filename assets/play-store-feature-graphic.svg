<?xml version="1.0" encoding="UTF-8"?>
<!-- YARAM Play Store Feature Graphic 1024x500 - YARAM brand -->
<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background : dégradé rose YARAM -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8FA3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB5C5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>

  <!-- Cercles décoratifs (effet bulles cosmétiques) -->
  <circle cx="850" cy="100" r="60" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="930" cy="200" r="35" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="780" cy="380" r="80" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="950" cy="420" r="25" fill="#FFFFFF" opacity="0.25"/>

  <!-- Logo / Nom YARAM -->
  <text x="80" y="170"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="110"
        font-weight="900"
        fill="#FFFFFF"
        letter-spacing="-2">YARAM</text>

  <!-- Tagline -->
  <text x="80" y="240"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="32"
        font-weight="500"
        fill="#FFFFFF"
        opacity="0.95">La beauté pour peaux africaines</text>

  <!-- Sous-tagline -->
  <text x="80" y="300"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="22"
        font-weight="400"
        fill="#FFFFFF"
        opacity="0.85">Scan IA peau · Livraison Dakar · Pharmacies certifiées</text>

  <!-- Badges features (style chip) -->
  <g transform="translate(80, 360)">
    <rect x="0" y="0" rx="22" ry="22" width="180" height="44" fill="#FFFFFF" opacity="0.95"/>
    <text x="90" y="29" text-anchor="middle"
          font-family="Helvetica Neue, Arial, sans-serif"
          font-size="16" font-weight="700" fill="#E63E7E">📸 Scan IA peau</text>
  </g>

  <g transform="translate(280, 360)">
    <rect x="0" y="0" rx="22" ry="22" width="170" height="44" fill="#FFFFFF" opacity="0.95"/>
    <text x="85" y="29" text-anchor="middle"
          font-family="Helvetica Neue, Arial, sans-serif"
          font-size="16" font-weight="700" fill="#E63E7E">🚚 Livraison J+1</text>
  </g>

  <g transform="translate(470, 360)">
    <rect x="0" y="0" rx="22" ry="22" width="160" height="44" fill="#FFFFFF" opacity="0.95"/>
    <text x="80" y="29" text-anchor="middle"
          font-family="Helvetica Neue, Arial, sans-serif"
          font-size="16" font-weight="700" fill="#E63E7E">✓ 100% authentique</text>
  </g>

  <!-- Mockup téléphone à droite (silhouette simple) -->
  <g transform="translate(720, 60)">
    <!-- Coque téléphone -->
    <rect x="0" y="0" rx="35" ry="35" width="220" height="380" fill="#1F1F1F"/>
    <rect x="8" y="8" rx="28" ry="28" width="204" height="364" fill="#FFFFFF"/>

    <!-- Header app (gradient rose) -->
    <rect x="8" y="8" rx="28" ry="0" width="204" height="80" fill="#FF6B9D"/>
    <text x="110" y="58" text-anchor="middle"
          font-family="Helvetica Neue, Arial, sans-serif"
          font-size="22" font-weight="900" fill="#FFFFFF">YARAM</text>

    <!-- Search bar mockup -->
    <rect x="25" y="100" rx="20" ry="20" width="170" height="38" fill="#F3F4F6"/>
    <circle cx="45" cy="119" r="6" fill="none" stroke="#9CA3AF" stroke-width="2"/>
    <text x="65" y="124" font-family="Helvetica Neue, Arial, sans-serif"
          font-size="12" fill="#9CA3AF">Rechercher un produit</text>

    <!-- Product cards mockup (4 tuiles) -->
    <g transform="translate(25, 155)">
      <rect x="0" y="0" rx="10" ry="10" width="75" height="95" fill="#FFE4ED"/>
      <circle cx="37" cy="35" r="20" fill="#FF8FA3"/>
      <rect x="10" y="65" width="55" height="6" fill="#FFB5C5"/>
      <rect x="10" y="76" width="40" height="6" fill="#FFB5C5"/>
    </g>
    <g transform="translate(110, 155)">
      <rect x="0" y="0" rx="10" ry="10" width="75" height="95" fill="#FFE4ED"/>
      <circle cx="37" cy="35" r="20" fill="#FF8FA3"/>
      <rect x="10" y="65" width="55" height="6" fill="#FFB5C5"/>
      <rect x="10" y="76" width="40" height="6" fill="#FFB5C5"/>
    </g>
    <g transform="translate(25, 265)">
      <rect x="0" y="0" rx="10" ry="10" width="75" height="95" fill="#FFE4ED"/>
      <circle cx="37" cy="35" r="20" fill="#FF8FA3"/>
      <rect x="10" y="65" width="55" height="6" fill="#FFB5C5"/>
      <rect x="10" y="76" width="40" height="6" fill="#FFB5C5"/>
    </g>
    <g transform="translate(110, 265)">
      <rect x="0" y="0" rx="10" ry="10" width="75" height="95" fill="#FFE4ED"/>
      <circle cx="37" cy="35" r="20" fill="#FF8FA3"/>
      <rect x="10" y="65" width="55" height="6" fill="#FFB5C5"/>
      <rect x="10" y="76" width="40" height="6" fill="#FFB5C5"/>
    </g>
  </g>
</svg>
