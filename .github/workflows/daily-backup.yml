name: Daily DB Backup

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  trigger-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase backup-db function
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            "https://qxhhnrnworwrnwmqekmb.supabase.co/functions/v1/backup-db" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "x-backup-token: ${{ secrets.BACKUP_TOKEN }}")

          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Backup failed with HTTP $HTTP_CODE"
            exit 1
          fi

          if ! grep -q '"success":true' /tmp/response.json; then
            echo "❌ Backup response indicates failure"
            exit 1
          fi

          echo "✓ Backup successful"
